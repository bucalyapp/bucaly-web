<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bucaly — Panel de Gestión</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --teal: #00bfab;
    --teal-dark: #007d70;
    --bg: #f4f6f8;
    --card: #ffffff;
    --text: #1a2332;
    --muted: #6b7a8d;
    --border: #e2e8f0;
    --emergency: #ef4444;
    --urgent: #f97316;
    --soon: #eab308;
    --routine: #22c55e;
  }

  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

  /* ── LOGIN ── */
  #loginScreen {
    min-height: 100vh; display: flex; align-items: center; justify-content: center;
    background: linear-gradient(160deg, #0B1F35, #0D2B45 60%, #0A3D38);
  }
  .login-box {
    background: white; border-radius: 20px; padding: 40px; width: 100%; max-width: 400px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.3);
  }
  .login-logo { display: flex; align-items: center; gap: 12px; margin-bottom: 32px; }
  .login-logo-icon {
    width: 48px; height: 48px; border-radius: 14px;
    background: linear-gradient(145deg, #00bfab, #007d70);
    display: flex; align-items: center; justify-content: center;
  }
  .login-logo-icon svg { width: 30px; height: 30px; }
  .login-logo h1 { font-size: 22px; font-weight: 700; color: var(--text); }
  .login-logo p { font-size: 12px; color: var(--muted); }
  .login-box label { display: block; font-size: 13px; font-weight: 500; color: var(--muted); margin-bottom: 6px; margin-top: 16px; }
  .login-box input {
    width: 100%; padding: 12px 16px; border: 1.5px solid var(--border);
    border-radius: 10px; font-size: 15px; outline: none; transition: border .2s;
  }
  .login-box input:focus { border-color: var(--teal); }
  .btn-login-dash {
    width: 100%; margin-top: 24px; padding: 14px;
    background: linear-gradient(135deg, var(--teal), var(--teal-dark));
    color: white; border: none; border-radius: 12px;
    font-size: 16px; font-weight: 600; cursor: pointer; transition: opacity .2s;
  }
  .btn-login-dash:hover { opacity: 0.9; }
  .login-error { margin-top: 12px; color: var(--emergency); font-size: 13px; text-align: center; min-height: 18px; }

  /* ── DASHBOARD ── */
  #dashScreen { display: none; }

  .topbar {
    background: white; border-bottom: 1px solid var(--border);
    padding: 0 24px; height: 60px; display: flex; align-items: center; justify-content: space-between;
    position: sticky; top: 0; z-index: 100;
  }
  .topbar-left { display: flex; align-items: center; gap: 12px; }
  .topbar-logo {
    width: 36px; height: 36px; border-radius: 10px;
    background: linear-gradient(145deg, #00bfab, #007d70);
    display: flex; align-items: center; justify-content: center;
  }
  .topbar-logo svg { width: 22px; height: 22px; }
  .topbar h1 { font-size: 18px; font-weight: 700; }
  .topbar-right { display: flex; align-items: center; gap: 16px; }
  .topbar-user { font-size: 13px; color: var(--muted); }
  .btn-logout {
    padding: 7px 16px; border: 1.5px solid var(--border); background: white;
    border-radius: 8px; font-size: 13px; cursor: pointer; color: var(--muted); transition: all .2s;
  }
  .btn-logout:hover { border-color: var(--emergency); color: var(--emergency); }

  .main { padding: 24px; max-width: 1200px; margin: 0 auto; }

  /* stats */
  .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 16px; margin-bottom: 28px; }
  .stat-card {
    background: white; border-radius: 14px; padding: 20px;
    border: 1px solid var(--border);
  }
  .stat-label { font-size: 12px; color: var(--muted); font-weight: 500; text-transform: uppercase; letter-spacing: .05em; }
  .stat-value { font-size: 32px; font-weight: 700; margin-top: 4px; }
  .stat-card.emergency .stat-value { color: var(--emergency); }
  .stat-card.urgent .stat-value { color: var(--urgent); }
  .stat-card.soon .stat-value { color: var(--soon); }
  .stat-card.routine .stat-value { color: var(--routine); }
  .stat-card.total .stat-value { color: var(--teal-dark); }

  /* filters */
  .toolbar { display: flex; gap: 12px; margin-bottom: 20px; flex-wrap: wrap; align-items: center; }
  .search-input {
    flex: 1; min-width: 200px; padding: 10px 16px; border: 1.5px solid var(--border);
    border-radius: 10px; font-size: 14px; outline: none; transition: border .2s;
  }
  .search-input:focus { border-color: var(--teal); }
  .filter-btn {
    padding: 10px 18px; border: 1.5px solid var(--border); background: white;
    border-radius: 10px; font-size: 13px; font-weight: 500; cursor: pointer; transition: all .2s;
  }
  .filter-btn:hover, .filter-btn.active { background: var(--teal); color: white; border-color: var(--teal); }
  .filter-btn.emergency.active { background: var(--emergency); border-color: var(--emergency); }
  .filter-btn.urgent.active { background: var(--urgent); border-color: var(--urgent); }
  .filter-btn.soon.active { background: var(--soon); border-color: var(--soon); }
  .filter-btn.routine.active { background: var(--routine); border-color: var(--routine); }
  .btn-refresh {
    padding: 10px 16px; background: var(--teal); color: white; border: none;
    border-radius: 10px; font-size: 13px; font-weight: 500; cursor: pointer;
  }

  /* table */
  .table-wrap { background: white; border-radius: 16px; border: 1px solid var(--border); overflow: hidden; }
  table { width: 100%; border-collapse: collapse; }
  thead th {
    padding: 14px 16px; text-align: left; font-size: 12px; font-weight: 600;
    color: var(--muted); text-transform: uppercase; letter-spacing: .05em;
    background: #f8fafc; border-bottom: 1px solid var(--border);
  }
  tbody tr { border-bottom: 1px solid var(--border); transition: background .15s; cursor: pointer; }
  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: #f8fafc; }
  td { padding: 14px 16px; font-size: 14px; }
  .td-nombre { font-weight: 600; }
  .td-email { color: var(--muted); font-size: 13px; }

  .badge {
    display: inline-flex; align-items: center; gap: 4px;
    padding: 4px 10px; border-radius: 20px; font-size: 12px; font-weight: 600;
  }
  .badge.emergency { background: #fef2f2; color: var(--emergency); }
  .badge.urgent    { background: #fff7ed; color: var(--urgent); }
  .badge.soon      { background: #fefce8; color: #854d0e; }
  .badge.routine   { background: #f0fdf4; color: #166534; }
  .badge.none      { background: #f1f5f9; color: var(--muted); }

  .empty { text-align: center; padding: 60px; color: var(--muted); font-size: 15px; }

  /* modal */
  .modal-overlay {
    display: none; position: fixed; inset: 0; background: rgba(0,0,0,.45);
    z-index: 200; align-items: center; justify-content: center; padding: 20px;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: white; border-radius: 20px; width: 100%; max-width: 560px;
    max-height: 85vh; overflow-y: auto; padding: 32px;
  }
  .modal-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 24px; }
  .modal-header h2 { font-size: 20px; font-weight: 700; }
  .modal-close { background: none; border: none; font-size: 24px; cursor: pointer; color: var(--muted); line-height: 1; }
  .modal-section { margin-bottom: 20px; }
  .modal-section h3 { font-size: 12px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: .05em; margin-bottom: 12px; }
  .modal-field { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid var(--border); font-size: 14px; }
  .modal-field:last-child { border-bottom: none; }
  .modal-field-label { color: var(--muted); }
  .modal-field-value { font-weight: 500; text-align: right; max-width: 60%; }
  .triage-card {
    background: #f8fafc; border-radius: 12px; padding: 16px; margin-bottom: 12px;
    border-left: 4px solid var(--border); cursor: pointer;
  }
  .triage-card.emergency { border-left-color: var(--emergency); }
  .triage-card.urgent    { border-left-color: var(--urgent); }
  .triage-card.soon      { border-left-color: var(--soon); }
  .triage-card.routine   { border-left-color: var(--routine); }
  .triage-card-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
  .triage-symptom { font-weight: 600; font-size: 14px; }
  .triage-date { font-size: 12px; color: var(--muted); }
  .triage-specialist { font-size: 13px; color: var(--muted); margin-top: 4px; }

  .loading { text-align: center; padding: 40px; color: var(--muted); }
</style>
</head>
<body>

<!-- LOGIN -->
<div id="loginScreen">
  <div class="login-box">
    <div class="login-logo">
      <div class="login-logo-icon">
        <svg viewBox="0 0 80 80" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <radialGradient id="tb" cx="42%" cy="30%" r="55%">
              <stop offset="0%" stop-color="#ffffff"/>
              <stop offset="70%" stop-color="#ffffff"/>
              <stop offset="100%" stop-color="#e0f5f3"/>
            </radialGradient>
            <filter id="fs" x="-20%" y="-10%" width="140%" height="140%">
              <feDropShadow dx="0" dy="6" stdDeviation="5" flood-color="rgba(0,50,44,0.5)"/>
            </filter>
          </defs>
          <path d="M18 56 C18 56 16 46 14 36 C12 26 12 18 18 14 C22 10 28 10 32 10 C36 10 40 10 40 10 C40 10 44 10 48 10 C52 10 58 10 62 14 C68 18 68 26 66 36 C64 46 62 56 62 56 C62 60 60 64 57 64 C54 64 52 60 50 54 C48 48 46 44 40 44 C34 44 32 48 30 54 C28 60 26 64 23 64 C20 64 18 60 18 56 Z" fill="url(#tb)" filter="url(#fs)"/>
          <ellipse cx="30" cy="19" rx="10" ry="6" fill="rgba(255,255,255,0.9)" transform="rotate(-30 30 19)"/>
          <ellipse cx="23" cy="27" rx="4" ry="2.5" fill="rgba(255,255,255,0.55)" transform="rotate(-30 23 27)"/>
        </svg>
      </div>
      <div>
        <h1>Bucaly</h1>
        <p>Panel de gestión dental</p>
      </div>
    </div>
    <label>Correo electrónico</label>
    <input type="email" id="dashEmail" placeholder="dentista@bucaly.cl" />
    <label>Contraseña</label>
    <input type="password" id="dashPass" placeholder="••••••••" onkeydown="if(event.key==='Enter') dashLogin()" />
    <p class="login-error" id="loginError"></p>
    <button class="btn-login-dash" onclick="dashLogin()" id="dashLoginBtn">Ingresar al panel →</button>
  </div>
</div>

<!-- DASHBOARD -->
<div id="dashScreen">
  <div class="topbar">
    <div class="topbar-left">
      <div class="topbar-logo">
        <svg viewBox="0 0 80 80" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <radialGradient id="tb" cx="42%" cy="30%" r="55%">
              <stop offset="0%" stop-color="#ffffff"/>
              <stop offset="70%" stop-color="#ffffff"/>
              <stop offset="100%" stop-color="#e0f5f3"/>
            </radialGradient>
            <filter id="fs" x="-20%" y="-10%" width="140%" height="140%">
              <feDropShadow dx="0" dy="6" stdDeviation="5" flood-color="rgba(0,50,44,0.5)"/>
            </filter>
          </defs>
          <path d="M18 56 C18 56 16 46 14 36 C12 26 12 18 18 14 C22 10 28 10 32 10 C36 10 40 10 40 10 C40 10 44 10 48 10 C52 10 58 10 62 14 C68 18 68 26 66 36 C64 46 62 56 62 56 C62 60 60 64 57 64 C54 64 52 60 50 54 C48 48 46 44 40 44 C34 44 32 48 30 54 C28 60 26 64 23 64 C20 64 18 60 18 56 Z" fill="url(#tb)" filter="url(#fs)"/>
          <ellipse cx="30" cy="19" rx="10" ry="6" fill="rgba(255,255,255,0.9)" transform="rotate(-30 30 19)"/>
          <ellipse cx="23" cy="27" rx="4" ry="2.5" fill="rgba(255,255,255,0.55)" transform="rotate(-30 23 27)"/>
        </svg>
      </div>
      <h1>Panel Bucaly</h1>
    </div>
    <div class="topbar-right">
      <span class="topbar-user" id="topbarUser"></span>
      <button class="btn-logout" onclick="dashLogout()">Cerrar sesión</button>
    </div>
  </div>

  <div class="main">
    <!-- stats -->
    <div class="stats" id="statsGrid">
      <div class="stat-card total"><div class="stat-label">Total pacientes</div><div class="stat-value" id="statTotal">—</div></div>
      <div class="stat-card emergency"><div class="stat-label">Emergencia</div><div class="stat-value" id="statEmergency">—</div></div>
      <div class="stat-card urgent"><div class="stat-label">Urgente</div><div class="stat-value" id="statUrgent">—</div></div>
      <div class="stat-card soon"><div class="stat-label">Pronto</div><div class="stat-value" id="statSoon">—</div></div>
      <div class="stat-card routine"><div class="stat-label">Rutina</div><div class="stat-value" id="statRoutine">—</div></div>
    </div>

    <!-- toolbar -->
    <div class="toolbar">
      <input class="search-input" type="text" placeholder="Buscar por nombre o email..." oninput="filterPatients()" id="searchInput" />
      <button class="filter-btn active" onclick="setFilter('')" id="filterAll">Todos</button>
      <button class="filter-btn emergency" onclick="setFilter('emergency')" id="filterEmergency">🔴 Emergencia</button>
      <button class="filter-btn urgent" onclick="setFilter('urgent')" id="filterUrgent">🟠 Urgente</button>
      <button class="filter-btn soon" onclick="setFilter('soon')" id="filterSoon">🟡 Pronto</button>
      <button class="filter-btn routine" onclick="setFilter('routine')" id="filterRoutine">🟢 Rutina</button>
      <button class="btn-refresh" onclick="loadData()">↻ Actualizar</button>
    </div>

    <!-- table -->
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Paciente</th>
            <th>RUT</th>
            <th>Teléfono</th>
            <th>Última urgencia</th>
            <th>Triajes</th>
            <th>Registrado</th>
          </tr>
        </thead>
        <tbody id="patientsTable">
          <tr><td colspan="6" class="loading">Cargando pacientes...</td></tr>
        </tbody>
      </table>
    </div>
  </div>
</div>

<!-- MODAL paciente -->
<div class="modal-overlay" id="patientModal" onclick="if(event.target===this) closeModal()">
  <div class="modal">
    <div class="modal-header">
      <h2 id="modalNombre">—</h2>
      <button class="modal-close" onclick="closeModal()">×</button>
    </div>
    <div class="modal-section">
      <h3>Datos del paciente</h3>
      <div class="modal-field"><span class="modal-field-label">Email</span><span class="modal-field-value" id="modalEmail">—</span></div>
      <div class="modal-field"><span class="modal-field-label">RUT</span><span class="modal-field-value" id="modalRut">—</span></div>
      <div class="modal-field"><span class="modal-field-label">Teléfono</span><span class="modal-field-value" id="modalTel">—</span></div>
      <div class="modal-field"><span class="modal-field-label">Registrado</span><span class="modal-field-value" id="modalFecha">—</span></div>
    </div>
    <div class="modal-section">
      <h3>Historial de triajes</h3>
      <div id="modalTriages"><p style="color:var(--muted);font-size:14px">Sin triajes registrados.</p></div>
    </div>
  </div>
</div>

<script>
const API = 'https://api-production-37bd.up.railway.app';
let TOKEN = '';
let allPatients = [];
let currentFilter = '';

const URGENCY_LABELS = {
  emergency: 'Emergencia',
  urgent: 'Urgente',
  soon: 'Pronto',
  routine: 'Rutina',
};

// ── AUTH ──
async function dashLogin() {
  const email = document.getElementById('dashEmail').value.trim();
  const pass  = document.getElementById('dashPass').value;
  const errEl = document.getElementById('loginError');
  const btn   = document.getElementById('dashLoginBtn');
  errEl.textContent = '';
  if (!email || !pass) { errEl.textContent = 'Ingresa tu correo y contraseña.'; return; }
  btn.disabled = true; btn.textContent = 'Ingresando...';
  try {
    const r = await fetch(`${API}/api/auth/login`, {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password: pass })
    });
    const data = await r.json();
    if (!r.ok) { errEl.textContent = data.error || 'Credenciales incorrectas'; return; }
    if (data.user.role === 'patient') { errEl.textContent = 'Acceso solo para dentistas o administradores.'; return; }
    TOKEN = data.token;
    sessionStorage.setItem('dash_token', TOKEN);
    sessionStorage.setItem('dash_user', JSON.stringify(data.user));
    showDash(data.user);
  } catch(e) {
    errEl.textContent = 'No se pudo conectar al servidor.';
  } finally {
    btn.disabled = false; btn.textContent = 'Ingresar al panel →';
  }
}

function dashLogout() {
  sessionStorage.clear();
  TOKEN = ''; allPatients = [];
  document.getElementById('dashScreen').style.display = 'none';
  document.getElementById('loginScreen').style.display = 'flex';
}

function showDash(user) {
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('dashScreen').style.display = 'block';
  document.getElementById('topbarUser').textContent = user.nombre;
  loadData();
}

// ── DATA ──
async function loadData() {
  document.getElementById('patientsTable').innerHTML = '<tr><td colspan="6" class="loading">Cargando...</td></tr>';
  try {
    const [pRes, tRes] = await Promise.all([
      fetch(`${API}/api/patients?limit=200`, { headers: { Authorization: `Bearer ${TOKEN}` } }),
      fetch(`${API}/api/triages?limit=200`,  { headers: { Authorization: `Bearer ${TOKEN}` } }),
    ]);
    const pData = await pRes.json();
    const tData = await tRes.json();
    const triages = tData.data || [];

    // pacientes registrados con sus triajes
    allPatients = (pData.data || []).map(p => ({
      ...p,
      triages: triages.filter(t => t.patient_id === p.id)
    }));

    // triajes anónimos (sin paciente registrado) → mostrar como fila anónima
    const anonTriages = triages.filter(t => !t.patient_id);
    if (anonTriages.length > 0) {
      allPatients.push({
        id: '__anon__',
        nombre: 'Pacientes anónimos',
        email: `${anonTriages.length} triaje(s) sin cuenta`,
        rut: '—', telefono: '—',
        created_at: anonTriages[0].created_at,
        triages: anonTriages,
      });
    }

    updateStats(triages);
    renderTable();
  } catch(e) {
    document.getElementById('patientsTable').innerHTML = '<tr><td colspan="6" class="empty">Error cargando datos.</td></tr>';
  }
}

function updateStats(triages) {
  document.getElementById('statTotal').textContent = allPatients.length;
  ['emergency','urgent','soon','routine'].forEach(u => {
    document.getElementById('stat' + u.charAt(0).toUpperCase() + u.slice(1)).textContent =
      triages.filter(t => t.urgency_level === u).length;
  });
}

function setFilter(f) {
  currentFilter = f;
  ['All','Emergency','Urgent','Soon','Routine'].forEach(n => {
    document.getElementById('filter' + n)?.classList.remove('active');
  });
  const id = f ? 'filter' + f.charAt(0).toUpperCase() + f.slice(1) : 'filterAll';
  document.getElementById(id)?.classList.add('active');
  renderTable();
}

function filterPatients() { renderTable(); }

function renderTable() {
  const search = document.getElementById('searchInput').value.toLowerCase();
  let patients = allPatients;

  if (currentFilter) {
    patients = patients.filter(p => p.triages.some(t => t.urgency_level === currentFilter));
  }
  if (search) {
    patients = patients.filter(p =>
      (p.nombre || '').toLowerCase().includes(search) ||
      (p.email  || '').toLowerCase().includes(search)
    );
  }

  if (!patients.length) {
    document.getElementById('patientsTable').innerHTML = '<tr><td colspan="6" class="empty">Sin resultados.</td></tr>';
    return;
  }

  const urgencyOrder = { emergency: 0, urgent: 1, soon: 2, routine: 3 };
  const lastUrgency = p => {
    if (!p.triages.length) return null;
    return p.triages.sort((a,b) => new Date(b.created_at) - new Date(a.created_at))[0].urgency_level;
  };

  patients.sort((a,b) => {
    const ua = urgencyOrder[lastUrgency(a)] ?? 99;
    const ub = urgencyOrder[lastUrgency(b)] ?? 99;
    return ua - ub || new Date(b.created_at) - new Date(a.created_at);
  });

  document.getElementById('patientsTable').innerHTML = patients.map(p => {
    const lu = lastUrgency(p);
    const badge = lu
      ? `<span class="badge ${lu}">${URGENCY_LABELS[lu]}</span>`
      : `<span class="badge none">Sin triaje</span>`;
    const fecha = new Date(p.created_at).toLocaleDateString('es-CL', { day:'2-digit', month:'short', year:'numeric' });
    return `<tr onclick="openPatient('${p.id}')">
      <td><div class="td-nombre">${p.nombre}</div><div class="td-email">${p.email}</div></td>
      <td>${p.rut || '—'}</td>
      <td>${p.telefono || '—'}</td>
      <td>${badge}</td>
      <td>${p.triages.length}</td>
      <td>${fecha}</td>
    </tr>`;
  }).join('');
}

// ── MODAL ──
function openPatient(id) {
  const p = allPatients.find(x => x.id === id);
  if (!p) return;
  document.getElementById('modalNombre').textContent = p.nombre;
  document.getElementById('modalEmail').textContent  = p.email;
  document.getElementById('modalRut').textContent    = p.rut || '—';
  document.getElementById('modalTel').textContent    = p.telefono || '—';
  document.getElementById('modalFecha').textContent  =
    new Date(p.created_at).toLocaleDateString('es-CL', { day:'2-digit', month:'long', year:'numeric' });

  const triages = [...p.triages].sort((a,b) => new Date(b.created_at) - new Date(a.created_at));
  document.getElementById('modalTriages').innerHTML = triages.length
    ? triages.map(t => `
      <div class="triage-card ${t.urgency_level}">
        <div class="triage-card-top">
          <span class="triage-symptom">${t.symptom}</span>
          <span class="badge ${t.urgency_level}">${URGENCY_LABELS[t.urgency_level]}</span>
        </div>
        ${t.specialist ? `<div class="triage-specialist">Especialista: ${t.specialist}</div>` : ''}
        ${t.pain_level != null ? `<div class="triage-specialist">Dolor: ${t.pain_level}/10</div>` : ''}
        <div class="triage-date">${new Date(t.created_at).toLocaleString('es-CL')}</div>
      </div>`).join('')
    : '<p style="color:var(--muted);font-size:14px">Sin triajes registrados.</p>';

  document.getElementById('patientModal').classList.add('open');
}

function closeModal() {
  document.getElementById('patientModal').classList.remove('open');
}

// ── INIT ──
const savedToken = sessionStorage.getItem('dash_token');
const savedUser  = sessionStorage.getItem('dash_user');
if (savedToken && savedUser) {
  TOKEN = savedToken;
  showDash(JSON.parse(savedUser));
}
</script>
</body>
